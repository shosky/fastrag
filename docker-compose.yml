services:
  # ==================== Application ====================
  fastrag-app:
    build:
      context: ./fastrag-backend
      dockerfile: Dockerfile
    container_name: fastrag-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/fastrag?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&connectionCollation=utf8mb4_unicode_ci&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root123
      - SPRING_DATA_REDIS_HOST=redis
      - AI_GATEWAY_URL=http://host.docker.internal:11434
      - JWT_SECRET=FastRAGSecretKeyForJWT2024PleaseChangeInProd!
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - upload-data:/app/uploads
    networks:
      - fastrag-net
    restart: unless-stopped

  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: fastrag-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: fastrag
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./fastrag-backend/init-scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./fastrag-backend/init-scripts/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastrag-net
    restart: unless-stopped

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: fastrag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastrag-net
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  upload-data:

networks:
  fastrag-net:
    driver: bridge
