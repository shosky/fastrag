version: '3.8'

services:
  # ==================== Application ====================
  fastrag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastrag-app
    ports:
      - "8080:8080"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=fastrag
      - MYSQL_PASSWORD=fastrag123
      - REDIS_HOST=redis
      - ES_HOST=elasticsearch
      - RABBITMQ_HOST=rabbitmq
      - MILVUS_HOST=milvus
      - NEO4J_HOST=neo4j
      - MINIO_HOST=minio
      - AI_GATEWAY_URL=http://host.docker.internal:11434
      - JWT_SECRET=FastRAGSecretKeyForJWT2024PleaseChangeInProd!
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - fastrag-net
    restart: unless-stopped

  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: fastrag-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: fastrag
      MYSQL_USER: fastrag
      MYSQL_PASSWORD: fastrag123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./init-scripts/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastrag-net
    restart: unless-stopped

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: fastrag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastrag-net
    restart: unless-stopped

  # ==================== Elasticsearch ====================
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: fastrag-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - fastrag-net
    restart: unless-stopped

  # ==================== RabbitMQ ====================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fastrag-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: fastrag
      RABBITMQ_DEFAULT_PASS: fastrag123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - fastrag-net
    restart: unless-stopped

  # ==================== Milvus ====================
  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: fastrag-milvus
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - fastrag-net
    restart: unless-stopped

  # ==================== Neo4j ====================
  neo4j:
    image: neo4j:5-community
    container_name: fastrag-neo4j
    environment:
      NEO4J_AUTH: neo4j/fastrag123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    networks:
      - fastrag-net
    restart: unless-stopped

  # ==================== MinIO ====================
  minio:
    image: minio/minio:latest
    container_name: fastrag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - fastrag-net
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  es-data:
  rabbitmq-data:
  milvus-data:
  neo4j-data:
  minio-data:

networks:
  fastrag-net:
    driver: bridge
