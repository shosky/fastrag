server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: fastrag-backend
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/fastrag?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&connectionCollation=utf8mb4_unicode_ci&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

jwt:
  secret: FastRAGSecretKeyForJWT2024PleaseChangeInProd!
  expiration: 86400000

ai:
  gateway:
    url: http://127.0.0.1:11434
  asr:
    url: https://api.siliconflow.cn
    key: ${ASR_API_KEY:}
    model: FunAudioLLM/SenseVoiceSmall
  ocr:
    url: https://api.siliconflow.cn
    key: ${ASR_API_KEY:}
    model: deepseek-ai/DeepSeek-OCR

# 本地文件存储路径
storage:
  local:
    path: ./uploads

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.fastrag: DEBUG
    org.springframework.security: DEBUG
