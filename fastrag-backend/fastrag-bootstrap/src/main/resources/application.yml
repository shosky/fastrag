server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: fastrag-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:3306/fastrag?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&connectionCollation=utf8mb4_unicode_ci&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0
  elasticsearch:
    uris: http://${ES_HOST}:9200
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

milvus:
  host: ${MILVUS_HOST}
  port: 19530

neo4j:
  uri: bolt://${NEO4J_HOST}:7687
  username: ${NEO4J_USER}
  password: ${NEO4J_PASSWORD}

minio:
  endpoint: http://${MINIO_HOST}:9000
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: fastrag

ai:
  gateway:
    url: ${AI_GATEWAY_URL}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.fastrag: DEBUG
    org.springframework.security: DEBUG